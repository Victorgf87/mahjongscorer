<!DOCTYPE html>
<html lang="en" class="[color-scheme:light]">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Community — Mahjong Pavilion (reference)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#f9faf3] font-[Work_Sans,sans-serif] text-[#1a1c18]">
  <nav class="border-b border-[#004e34]/10 bg-[#f9faf3]/90 backdrop-blur-md">
    <div class="mx-auto flex h-16 max-w-7xl items-center px-4">
      <span class="font-[Plus_Jakarta_Sans,sans-serif] text-lg font-extrabold text-[#004e34]">MAHJONG PAVILION</span>
    </div>
  </nav>

  <div class="relative overflow-hidden border-b border-[#e2e3dc] bg-gradient-to-br from-[#004e34] to-[#006847] px-4 py-12 text-white sm:px-6 lg:px-8">
    <div class="mx-auto max-w-7xl">
      <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-white/80">Open community</span>
      <h1 class="mt-2 font-[Plus_Jakarta_Sans,sans-serif] text-4xl font-extrabold tracking-tight">Club Riichi Madrid</h1>
      <p class="mt-3 max-w-2xl text-sm text-white/90">Weekly meetups, EMA-rated events, and a friendly ladder.</p>
    </div>
  </div>

  <main class="mx-auto grid max-w-7xl gap-8 px-4 py-10 lg:grid-cols-3">
    <section class="lg:col-span-2 space-y-6">
      <div class="rounded-2xl border border-[#e2e3dc] bg-white p-6 shadow-sm ring-1 ring-black/5">
        <h2 class="font-[Plus_Jakarta_Sans,sans-serif] text-lg font-bold text-[#1a1c18]">Upcoming events</h2>
        <ul class="mt-4 space-y-3">
          <li class="flex items-center justify-between rounded-xl bg-[#f3f4ed] px-4 py-3">
            <div>
              <span class="text-xs font-bold uppercase text-[#6f7a72]">Mar 28 · 19:00</span>
              <p class="font-semibold text-[#1a1c18]">Spring League — Round 4</p>
            </div>
            <span class="rounded-full bg-[#004e34] px-4 py-1.5 text-xs font-bold uppercase tracking-widest text-white">Open</span>
          </li>
        </ul>
      </div>
      <div class="rounded-2xl border border-[#e2e3dc] bg-[#edeee8] p-6">
        <h2 class="font-[Plus_Jakarta_Sans,sans-serif] text-lg font-bold">Active leagues</h2>
        <div class="mt-4 flex items-center gap-3 rounded-xl bg-white p-4 ring-1 ring-black/5">
          <div class="flex h-12 w-12 items-center justify-center rounded-lg bg-[#b4151d] text-lg text-white">🏆</div>
          <div>
            <p class="font-bold text-[#1a1c18]">Spring 2026</p>
            <p class="text-xs text-[#6f7a72]">12 players</p>
          </div>
        </div>
      </div>
    </section>
    <aside class="space-y-4">
      <div class="rounded-2xl border border-[#e2e3dc] bg-[#e2e3dc]/60 p-5">
        <h3 class="text-xs font-bold uppercase tracking-widest text-[#6f7a72]">Members</h3>
        <p class="mt-2 text-2xl font-black text-[#1a1c18]">24</p>
        <p class="text-sm text-[#3f4943]">Open access — new players welcome.</p>
      </div>
    </aside>
  </main>
</body>
</html>
