<!DOCTYPE html>
<html lang="en" class="[color-scheme:light]">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recent Games — Mahjong Pavilion (reference)</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=JetBrains+Mono:wght@500&family=Work+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#f9faf3] font-[Work_Sans,sans-serif] text-[#1a1c18]">
  <div class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <div class="mb-8 flex flex-col justify-between gap-4 sm:flex-row sm:items-center">
      <div>
        <h1 class="font-[Plus_Jakarta_Sans,sans-serif] text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-[#004e34] to-[#006847]">Recent Games</h1>
        <p class="mt-1 text-[#6f7a72]">History of all matches played.</p>
      </div>
      <a href="#" class="inline-flex items-center gap-2 rounded-lg bg-[#004e34] px-6 py-2.5 text-sm font-bold text-white shadow-md hover:bg-[#006847]">+ New Game</a>
    </div>

    <div class="mb-6 flex flex-wrap gap-2">
      <span class="rounded-lg bg-[#004e34] px-4 py-2 text-sm font-bold text-white shadow">All</span>
      <a class="rounded-lg border border-[#e2e3dc] bg-white px-4 py-2 text-sm font-bold text-[#6f7a72]" href="#">Riichi</a>
      <a class="rounded-lg border border-[#e2e3dc] bg-white px-4 py-2 text-sm font-bold text-[#6f7a72]" href="#">MCR</a>
    </div>

    <div class="overflow-hidden rounded-2xl border border-[#e2e3dc] bg-white shadow-sm ring-1 ring-black/5">
      <table class="w-full text-left text-sm">
        <thead class="border-b border-[#e2e3dc] bg-[#f3f4ed] text-xs font-bold uppercase tracking-wider text-[#6f7a72]">
          <tr>
            <th class="px-6 py-3">Date</th>
            <th class="px-6 py-3">Variant</th>
            <th class="px-6 py-3">Players</th>
            <th class="px-6 py-3 text-right">Top score</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-[#e2e3dc]">
          <tr class="hover:bg-[#edeee8]/80">
            <td class="px-6 py-4 text-[#3f4943]">Mar 21, 2026</td>
            <td class="px-6 py-4"><span class="rounded bg-[#89bfff]/40 px-2 py-0.5 text-xs font-bold text-[#004d84]">Riichi</span></td>
            <td class="px-6 py-4">A · B · C · D</td>
            <td class="px-6 py-4 text-right font-[JetBrains_Mono,monospace] font-semibold text-[#004e34]">32,400</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
