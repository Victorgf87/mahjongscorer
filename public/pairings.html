<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pairing Engine v4.11.2 | Mahjong Scorer</title>
    <style>
        :root {
            --bg: #121212; --surface: #1e1e1e; --primary: #00c853;
            --text: #e0e0e0; --text-dim: #9e9e9e; --border: rgba(255,255,255,0.1);
            --danger: #ff5252;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0;
            padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 900px; }
        .card { background: var(--surface); border-radius: 24px; padding: 30px; margin-bottom: 25px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1 { color: var(--primary); margin-top: 0; display: flex; align-items: center; gap: 12px; font-size: 1.8rem; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { color: var(--text-dim); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        input { 
            background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text); 
            padding: 14px; border-radius: 14px; font-size: 1.1rem; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); }
        
        .btn { 
            background: var(--primary); color: var(--bg); border: none; padding: 16px; 
            border-radius: 14px; font-weight: 800; cursor: pointer; width: 100%; font-size: 1.1rem; 
            transition: transform 0.1s, opacity 0.2s; margin-top: 10px;
        }
        .btn:active { transform: scale(0.98); }
        
        .round-section { margin-top: 40px; }
        .round-header { 
            color: var(--primary); font-size: 1.6rem; font-weight: 800; margin: 40px 0 20px; 
            padding-left: 15px; border-left: 5px solid var(--primary);
        }
        .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .table-card { 
            background: var(--surface); border-radius: 18px; padding: 20px; 
            border: 1px solid var(--border); transition: transform 0.2s;
        }
        .table-card:hover { transform: translateY(-5px); }
        .table-title { font-weight: 800; font-size: 0.8rem; color: var(--primary); margin-bottom: 15px; text-transform: uppercase; opacity: 0.8; }
        .player-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .player-tag { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; font-size: 1rem; text-align: center; font-weight: 600; border: 1px solid rgba(255,255,255,0.03); }
        
        .stats-card { background: #1a1a1a; border-radius: 24px; padding: 30px; margin-top: 60px; border: 1px solid var(--primary); border-opacity: 0.2; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; margin-top: 20px; }
        .stat-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 14px; font-size: 0.9rem; border: 1px solid var(--border); }
        .stat-val { color: var(--primary); font-weight: 800; float: right; }
        
        .switch-group { 
            display: flex; align-items: center; justify-content: space-between; 
            background: rgba(255,255,255,0.03); padding: 18px; border-radius: 16px; border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(24px); }

        .version-tag { position: fixed; bottom: 10px; right: 15px; font-size: 0.7rem; color: var(--primary); opacity: 0.5; font-weight: bold; }
        .nav-back { align-self: flex-start; margin-bottom: 25px; text-decoration: none; color: var(--text-dim); font-size: 0.95rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .nav-back:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="nav-back"><span>←</span> Volver al Scorer</a>
        
        <div class="card">
            <h1><span>🀄</span> Torneos Mahjong</h1>
            <p style="color:var(--text-dim); margin-bottom: 30px;">Generador profesional de emparejamientos con balanceo de equipos.</p>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Jugadores</label>
                    <input type="number" id="numPlayers" value="16" step="4" min="4">
                </div>
                <div class="form-group">
                    <label>Rondas</label>
                    <input type="number" id="numRounds" value="3" min="1" max="20">
                </div>
            </div>

            <div class="switch-group">
                <div>
                    <div style="font-weight: 800; font-size: 1rem; margin-bottom: 4px;">Restricción de Equipos</div>
                    <div style="font-size: 0.8rem; color: var(--text-dim);">Evita compañeros en la misma mesa (cada 4 jugadores)</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="useTeams" checked>
                    <span class="slider"></span>
                </label>
            </div>
            
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px;">
                <button class="btn" onclick="generateTournament()">GENERAR EMPAREJAMIENTOS</button>
                <button id="exportBtn" class="btn" style="background: var(--surface); color: var(--primary); border: 2px solid var(--primary); display: none;" onclick="exportCSV()">CSV</button>
            </div>
        </div>

        <div id="results"></div>
    </div>

    <div class="version-tag">v4.11.3-export</div>

    <script src="js/pairing-engine.js"></script>
    <script>
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const p = params.get('p'), r = params.get('r'), t = params.get('t');
            if (p) document.getElementById('numPlayers').value = p;
            if (r) document.getElementById('numRounds').value = r;
            if (t !== null) document.getElementById('useTeams').checked = (t === '1');
            if (p && r) generateTournament(true);
        };

        function generateTournament(isAuto = false) {
            const numPlayers = parseInt(document.getElementById('numPlayers').value);
            const numRounds = parseInt(document.getElementById('numRounds').value);
            const useTeams = document.getElementById('useTeams').checked;
            const container = document.getElementById('results');
            
            if (numPlayers % 4 !== 0) return alert("El número de jugadores debe ser múltiplo de 4");
            
            if (!isAuto) {
                const newUrl = `${window.location.pathname}?p=${numPlayers}&r=${numRounds}&t=${useTeams ? 1 : 0}`;
                window.history.pushState({ path: newUrl }, '', newUrl);
            }

            container.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--primary); font-weight: 800; letter-spacing: 2px;">CALCULANDO RONDAS...</div>';

            const players = [];
            const getTeamId = (pid) => useTeams ? Math.ceil(pid / 4) : null;
            for (let i = 1; i <= numPlayers; i++) {
                players.push({ id: i, name: `Jugador ${i}`, score: 0, team_id: getTeamId(i) });
            }

            const pastRounds = [];
            
            // Usamos un pequeño timeout para que el "Calculando" se vea
            setTimeout(() => {
                try {
                    for (let r = 1; r <= numRounds; r++) {
                        let bestTables = null;
                        let attempts = 0;
                        const MAX_ATTEMPTS = 25;

                        while (attempts < MAX_ATTEMPTS) {
                            const engine = new PairingEngine(players, pastRounds);
                            let tables = engine.generateSmart();
                            tables = engine.optimize(tables, 30000);
                            
                            if (engine.totalCost(tables) < 5000000) {
                                bestTables = tables;
                                break;
                            }
                            attempts++;
                        }

                        if (!bestTables) throw new Error(`No se pudo generar una configuración válida para la Ronda ${r}`);

                        pastRounds.push({
                            number: r,
                            tables: bestTables.map(t => t.map(p => p.id))
                        });
                    }
                    displayTournament(pastRounds, useTeams);
                } catch (err) {
                    container.innerHTML = `<div class="card" style="border-color: var(--danger); text-align: center; color: var(--danger);">
                        <strong>❌ ERROR CRÍTICO</strong><br>${err.message}
                    </div>`;
                }
            }, 50);
        }

        function exportCSV() {
            if (!lastGeneratedRounds.length) return;
            
            let csv = "Ronda,Mesa,Jugador 1,Jugador 2,Jugador 3,Jugador 4\n";
            lastGeneratedRounds.forEach(r => {
                r.tables.forEach((t, i) => {
                    csv += `${r.number},${i + 1},#${t[0]},#${t[1]},#${t[2]},#${t[3]}\n`;
                });
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `mahjong_pairings_${lastGeneratedRounds.length}_rounds.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function displayTournament(rounds, useTeams) {
            const container = document.getElementById('results');
            container.innerHTML = "";
            
            const playerStats = {}; 
            const teamStats = {};   
            const teammateCollisions = []; 
            const getTeamId = (pid) => useTeams ? Math.ceil(pid / 4) : null;

            // Renderizar cada ronda
            rounds.forEach(round => {
                const roundSection = document.createElement('div');
                roundSection.className = 'round-section';
                
                const header = document.createElement('div');
                header.className = 'round-header';
                header.innerText = `Ronda ${round.number}`;
                roundSection.appendChild(header);
                
                const tableGrid = document.createElement('div');
                tableGrid.className = 'table-grid';
                
                round.tables.forEach((table, i) => {
                    const tableCard = document.createElement('div');
                    tableCard.className = 'table-card';
                    
                    let playersHtml = "";
                    table.forEach(id => {
                        playersHtml += `<div class="player-tag">#${id}</div>`;
                        
                        // Estadísticas (doble bucle para parejas)
                        table.forEach(id2 => {
                            if (id < id2) {
                                const pKey = `${id}-${id2}`;
                                playerStats[pKey] = (playerStats[pKey] || 0) + 1;
                                
                                if (useTeams) {
                                    const t1 = getTeamId(id), t2 = getTeamId(id2);
                                    if (t1 === t2) teammateCollisions.push({ r: round.number, m: i+1, t: t1, p1: id, p2: id2 });
                                    else {
                                        const tKey = [t1, t2].sort((a,b)=>a-b).join('-');
                                        teamStats[tKey] = (teamStats[tKey] || 0) + 1;
                                    }
                                }
                            }
                        });
                    });

                    tableCard.innerHTML = `<div class="table-title">Mesa ${i + 1}</div><div class="player-list">${playersHtml}</div>`;
                    tableGrid.appendChild(tableCard);
                });
                
                roundSection.appendChild(tableGrid);
                container.appendChild(roundSection);
            });

            // ANALISIS DE CALIDAD
            const statsCard = document.createElement('div');
            statsCard.className = 'stats-card';
            
            let playerRepeatsHtml = Object.entries(playerStats)
                .filter(([_, count]) => count > 1)
                .map(([key, count]) => `<div class="stat-item">Pareja ${key.replace('-', ' & ')} <span class="stat-val">${count} veces</span></div>`)
                .join('') || '<p style="color:var(--primary); font-weight:bold;">✅ Ningún jugador repite rival.</p>';

            let statsHtml = `<h2>📊 Análisis de Calidad</h2>
                <h3 style="font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase;">Repeticiones de Jugadores</h3>
                <div class="stats-grid">${playerRepeatsHtml}</div>`;

            if (useTeams) {
                let collisionsHtml = teammateCollisions
                    .map(c => `<div class="stat-item" style="border-color:var(--danger)">R${c.r} M${c.m}: #${c.p1} & #${c.p2} <span class="stat-val" style="color:var(--danger)">Equipo ${c.t}</span></div>`)
                    .join('') || '<p style="color:var(--primary); font-weight:bold;">✅ Compañeros siempre separados.</p>';

                let teamStatsHtml = Object.entries(teamStats)
                    .sort((a, b) => b[1] - a[1])
                    .map(([key, count]) => `<div class="stat-item">Equipos ${key.replace('-', ' vs ')} <span class="stat-val">${count} cruces</span></div>`)
                    .join('');

                statsHtml += `
                    <h3 style="font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; margin-top: 30px;">Colisiones de Compañeros</h3>
                    <div class="stats-grid">${collisionsHtml}</div>
                    <h3 style="font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; margin-top: 30px;">Enfrentamientos entre Equipos</h3>
                    <div class="stats-grid">${teamStatsHtml}</div>
                `;
            }

            statsCard.innerHTML = statsHtml;
            container.appendChild(statsCard);
        }
    </script>
</body>
</html>
