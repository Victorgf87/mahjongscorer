<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pairing Engine v4.11.1 | Mahjong Scorer</title>
    <style>
        :root {
            --bg: #121212; --surface: #1e1e1e; --primary: #00c853;
            --text: #e0e0e0; --text-dim: #9e9e9e; --border: rgba(255,255,255,0.1);
            --danger: #ff5252;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0;
            padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 800px; }
        .card { background: var(--surface); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); }
        h1 { color: var(--primary); margin-top: 0; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 0.9rem; }
        input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 12px; font-size: 1rem; box-sizing: border-box; }
        .btn { background: var(--primary); color: var(--bg); border: none; padding: 15px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1rem; transition: opacity 0.2s; margin-top: 10px; }
        .btn:hover { opacity: 0.9; }
        .round-header { color: var(--primary); font-size: 1.4rem; margin: 30px 0 15px; padding-bottom: 5px; border-bottom: 2px solid var(--border); }
        .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .table-card { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; border: 1px solid var(--border); border-top: 3px solid var(--primary); }
        .table-title { font-weight: bold; font-size: 0.8rem; opacity: 0.6; margin-bottom: 10px; text-transform: uppercase; }
        .player-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .player-tag { background: rgba(0,0,0,0.3); padding: 5px; border-radius: 6px; font-size: 0.9rem; text-align: center; }
        .stats-card { background: var(--surface); border-radius: 20px; padding: 25px; margin-top: 40px; border: 1px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.05); }
        .stat-val { color: var(--primary); font-weight: bold; float: right; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }
        .version-tag { position: fixed; bottom: 5px; right: 10px; font-size: 0.65rem; color: var(--primary); opacity: 0.6; }
        .nav-back { align-self: flex-start; margin-bottom: 20px; text-decoration: none; color: var(--text-dim); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="nav-back">← Volver al Scorer</a>
        <div class="card">
            <h1><span>📊</span> Generador de Torneos</h1>
            <div class="form-group"><label for="numPlayers">Número de Jugadores (múltiplo de 4)</label><input type="number" id="numPlayers" value="16" step="4"></div>
            <div class="form-group"><label for="numRounds">Número de Rondas</label><input type="number" id="numRounds" value="3"></div>
            <div class="form-group" style="display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid var(--border);">
                <div><div style="font-weight: bold; font-size: 0.9rem;">Restricción de Equipos</div><div style="font-size: 0.75rem; color: var(--text-dim);">Evita compañeros en la misma mesa</div></div>
                <label class="switch"><input type="checkbox" id="useTeams" checked><span class="slider"></span></label>
            </div>
            <button class="btn" onclick="generateTournament()">Generar Todas las Rondas</button>
        </div>
        <div id="results"></div>
    </div>
    <div class="version-tag">v4.11.1-restored</div>
    <script src="js/pairing-engine.js"></script>
    <script>
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const p = params.get('p'), r = params.get('r'), t = params.get('t');
            if (p) document.getElementById('numPlayers').value = p;
            if (r) document.getElementById('numRounds').value = r;
            if (t !== null) document.getElementById('useTeams').checked = (t === '1');
            if (p && r) generateTournament(true);
        };
        function generateTournament(isAuto = false) {
            const numPlayers = parseInt(document.getElementById('numPlayers').value), numRounds = parseInt(document.getElementById('numRounds').value), useTeams = document.getElementById('useTeams').checked, container = document.getElementById('results');
            if (numPlayers % 4 !== 0) return alert("Múltiplo de 4 requerido");
            if (!isAuto) { const newUrl = `${window.location.pathname}?p=${numPlayers}&r=${numRounds}&t=${useTeams ? 1 : 0}`; window.history.pushState({ path: newUrl }, '', newUrl); }
            container.innerHTML = '<p style="text-align:center;">Generando...</p>';
            const players = []; const getTeamId = (pid) => useTeams ? Math.ceil(pid / 4) : null;
            for (let i = 1; i <= numPlayers; i++) players.push({ id: i, name: `Jugador ${i}`, score: 0, team_id: getTeamId(i) });
            const pastRounds = [];
            try {
                for (let r = 1; r <= numRounds; r++) {
                    let bestTables = null; let attempts = 0;
                    while (attempts < 20) {
                        const engine = new PairingEngine(players, pastRounds);
                        let tables = engine.generateSmart(); tables = engine.optimize(tables, 30000);
                        if (engine.totalCost(tables) < 5000000) { bestTables = tables; break; }
                        attempts++;
                    }
                    if (!bestTables) throw new Error(`Ronda ${r} infactible`);
                    pastRounds.push({ number: r, tables: bestTables.map(t => t.map(p => p.id)) });
                }
                displayTournament(pastRounds, useTeams);
            } catch (err) { container.innerHTML = `<p style="color:var(--danger); text-align:center;">❌ Error: ${err.message}</p>`; }
        }
        function displayTournament(rounds, useTeams) {
            const container = document.getElementById('results'); container.innerHTML = "";
            const playerStats = {}, teamStats = {}, teammateCollisions = [], getTeamId = (pid) => useTeams ? Math.ceil(pid / 4) : null;
            rounds.forEach(round => {
                const roundDiv = document.createElement('div'); roundDiv.innerHTML = `<div class="round-header">Ronda ${round.number}</div>`;
                const tableGrid = document.createElement('div'); tableGrid.className = 'table-grid';
                round.tables.forEach((table, i) => {
                    const tableCard = document.createElement('div'); tableCard.className = 'table-card';
                    tableCard.innerHTML = `<div class="table-title">Mesa ${i+1}</div><div class="player-list">${table.map(id => `<div class="player-tag">#${id}</div>`).join('')}</div>`;
                    tableGrid.appendChild(tableCard);
                    for (let j = 0; j < table.length; j++) {
                        for (let k = j + 1; k < table.length; k++) {
                            const pKey = [table[j], table[k]].sort((a,b) => a-b).join('-'); playerStats[pKey] = (playerStats[pKey] || 0) + 1;
                            if (useTeams) {
                                const t1 = getTeamId(table[j]), t2 = getTeamId(table[k]);
                                if (t1 === t2) teammateCollisions.push({ r: round.number, m: i+1, t: t1, p1: table[j], p2: table[k] });
                                else { const tKey = [t1, t2].sort((a,b) => a-b).join('-'); teamStats[tKey] = (teamStats[tKey] || 0) + 1; }
                            }
                        }
                    }
                });
                roundDiv.appendChild(tableGrid); container.appendChild(roundDiv);
            });
            const statsCard = document.createElement('div'); statsCard.className = 'stats-card';
            let playerRepeatsHtml = Object.entries(playerStats).filter(([_, count]) => count > 1).map(([key, count]) => `<div class="stat-item">Pareja ${key.replace('-', ' & ')} <span class="stat-val">${count} veces</span></div>`).join('') || '<p style="color:var(--primary);">✅ Sin repeticiones.</p>';
            let statsHtml = `<h2>📊 Análisis</h2><h3>Repeticiones</h3><div class="stats-grid">${playerRepeatsHtml}</div>`;
            if (useTeams) {
                let collisionsHtml = teammateCollisions.map(c => `<div class="stat-item" style="border-color:var(--danger)">R${c.r} M${c.m}: #${c.p1} & #${c.p2} <span class="stat-val" style="color:var(--danger)">Eq ${c.t}</span></div>`).join('') || '<p style="color:var(--primary);">✅ Limpieza total.</p>';
                let teamStatsHtml = Object.entries(teamStats).sort((a, b) => b[1] - a[1]).map(([key, count]) => `<div class="stat-item">Eq ${key.replace('-', ' vs ')} <span class="stat-val">${count} cruces</span></div>`).join('');
                statsHtml += `<h3>Compañeros</h3><div class="stats-grid">${collisionsHtml}</div><h3>Cruces Equipos</h3><div class="stats-grid">${teamStatsHtml}</div>`;
            }
            statsCard.innerHTML = statsHtml; container.appendChild(statsCard);
        }
    </script>
</body>
</html>
