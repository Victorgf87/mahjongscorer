<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Torneos | Mahjong Scorer v4.20.0</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3406/3406059.png">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1338580016730480" crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-1338580016730480">
    <style>
        :root {
            --bg: #121212; --surface: #1e1e1e; --primary: #00c853;
            --text: #e0e0e0; --text-dim: #9e9e9e; --border: rgba(255,255,255,0.1);
            --danger: #ff5252;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 900px; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; width: 100%; }
        .header h1 { margin: 0; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; color: var(--primary); font-weight: 800; cursor: pointer; }
        .header h1 span { font-size: 1.8rem; }
        
        .main-nav { display: flex; gap: 15px; }
        .main-nav a { color: var(--text-dim); text-decoration: none; font-weight: 700; font-size: 0.85rem; transition: color 0.2s; }
        .main-nav a:hover { color: var(--primary); }
        .main-nav a.active { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 2px; }
        
        .card { background: var(--surface); border-radius: 32px; padding: 40px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.4); width: 100%; margin-bottom: 25px; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; text-align: left; }
        label { color: var(--text-dim); font-size: 0.8rem; font-weight: 800; text-transform: uppercase; }
        input { background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text); padding: 14px; border-radius: 14px; font-size: 1.1rem; outline: none; }
        
        .btn { background: var(--primary); color: var(--bg); border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; width: 100%; font-size: 1rem; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }

        .switch-group { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 18px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(24px); }

        .round-header { color: var(--primary); font-size: 1.6rem; font-weight: 800; margin: 40px 0 20px; padding-left: 15px; border-left: 5px solid var(--primary); }
        .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .table-card { background: var(--surface); border-radius: 18px; padding: 20px; border: 1px solid var(--border); }
        .table-title { font-weight: 800; font-size: 0.8rem; color: var(--primary); margin-bottom: 15px; text-transform: uppercase; }
        .player-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .player-tag { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; font-size: 1rem; text-align: center; font-weight: 600; }
        
        .stats-card { background: #1a1a1a; border-radius: 24px; padding: 30px; margin-top: 60px; border: 1px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; margin-top: 20px; }
        .stat-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 14px; font-size: 0.9rem; border: 1px solid var(--border); }
        .stat-val { color: var(--primary); font-weight: 800; float: right; }

        .version-tag { position: fixed; bottom: 10px; right: 15px; font-size: 0.65rem; color: var(--primary); opacity: 0.4; font-weight: bold; }
        @media (max-width: 600px) { .header { flex-direction: column; gap: 15px; } .main-nav { gap: 10px; } }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 onclick="location.href='index.html'"><span>🀄</span> Mahjong Scorer</h1>
            <nav class="main-nav">
                <a href="index.html">Árbitro</a>
                <a href="optimizer.html">Optimizador</a>
                <a href="pairings.html" class="active">Torneo</a>
                <a href="history.html">Historial</a>
            </nav>
        </header>

        <div class="card">
            <div class="form-row">
                <div class="form-group">
                    <label>Jugadores</label>
                    <input type="number" id="numPlayers" value="16" step="4">
                </div>
                <div class="form-group">
                    <label>Rondas</label>
                    <input type="number" id="numRounds" value="3">
                </div>
            </div>

            <div class="switch-group">
                <div>
                    <div style="font-weight: 800; font-size: 0.9rem;">Restricción de Equipos</div>
                    <div style="font-size: 0.75rem; color: var(--text-dim);">Evita compañeros en la mesa</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="useTeams" checked>
                    <span class="slider"></span>
                </label>
            </div>
            
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px;">
                <button class="btn" onclick="generateTournament()">GENERAR</button>
                <button id="exportBtn" class="btn" style="background: var(--surface); color: var(--primary); border: 2px solid var(--primary); display: none;" onclick="exportCSV()">CSV</button>
            </div>
        </div>

        <div id="results"></div>
    </div>

    <div class="version-tag">v4.19.0-unified</div>

    <script src="js/pairing-engine.js"></script>
    <script>
        let lastGeneratedRounds = [];
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('p')) document.getElementById('numPlayers').value = params.get('p');
            if (params.get('r')) document.getElementById('numRounds').value = params.get('r');
            if (params.get('t') !== null) document.getElementById('useTeams').checked = (params.get('t') === '1');
            if (params.get('p') && params.get('r')) generateTournament(true);
        };

        function generateTournament(isAuto = false) {
            const numPlayers = parseInt(document.getElementById('numPlayers').value), numRounds = parseInt(document.getElementById('numRounds').value), useTeams = document.getElementById('useTeams').checked, container = document.getElementById('results');
            if (numPlayers % 4 !== 0) return alert("Múltiplo de 4 requerido");
            if (!isAuto) { const newUrl = `${window.location.pathname}?p=${numPlayers}&r=${numRounds}&t=${useTeams ? 1 : 0}`; window.history.pushState({ path: newUrl }, '', newUrl); }
            container.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--primary); font-weight: 800;">CALCULANDO...</div>';
            
            setTimeout(() => {
                const players = []; const getTeamId = (pid) => useTeams ? Math.ceil(pid / 4) : null;
                for (let i = 1; i <= numPlayers; i++) players.push({ id: i, name: `Jugador ${i}`, score: 0, team_id: getTeamId(i) });
                const pastRounds = [];
                try {
                    for (let r = 1; r <= numRounds; r++) {
                        let bestTables = null; let attempts = 0;
                        while (attempts < 25) {
                            const engine = new PairingEngine(players, pastRounds);
                            let tables = engine.generateSmart(); tables = engine.optimize(tables, 30000);
                            if (engine.totalCost(tables) < 5000000) { bestTables = tables; break; }
                            attempts++;
                        }
                        if (!bestTables) throw new Error(`Ronda ${r} infactible`);
                        pastRounds.push({ number: r, tables: bestTables.map(t => t.map(p => p.id)) });
                    }
                    displayTournament(pastRounds, useTeams);
                } catch (err) { container.innerHTML = `<div class="card" style="color:var(--danger)">${err.message}</div>`; }
            }, 50);
        }

        function exportCSV() {
            if (!lastGeneratedRounds.length) return;
            let csv = "Ronda,Mesa,Jugador 1,Jugador 2,Jugador 3,Jugador 4\n";
            lastGeneratedRounds.forEach(r => { r.tables.forEach((t, i) => { csv += `${r.number},${i+1},#${t[0]},#${t[1]},#${t[2]},#${t[3]}\n`; }); });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' }), link = document.createElement("a");
            link.setAttribute("href", URL.createObjectURL(blob)); link.setAttribute("download", "torneo.csv");
            link.click();
        }

        function displayTournament(rounds, useTeams) {
            lastGeneratedRounds = rounds; document.getElementById('exportBtn').style.display = 'block';
            const container = document.getElementById('results'); container.innerHTML = "";
            const playerStats = {}, teamStats = {}, teammateCollisions = [], getTeamId = (pid) => useTeams ? Math.ceil(pid / 4) : null;
            rounds.forEach(round => {
                const roundSection = document.createElement('div');
                roundSection.innerHTML = `<div class="round-header">Ronda ${round.number}</div>`;
                const tableGrid = document.createElement('div'); tableGrid.className = 'table-grid';
                round.tables.forEach((table, i) => {
                    const tableCard = document.createElement('div'); tableCard.className = 'table-card';
                    let playersHtml = ""; table.forEach(id => {
                        playersHtml += `<div class="player-tag">#${id}</div>`;
                        table.forEach(id2 => { if (id < id2) {
                            const pKey = `${id}-${id2}`; playerStats[pKey] = (playerStats[pKey] || 0) + 1;
                            if (useTeams) {
                                const t1 = getTeamId(id), t2 = getTeamId(id2);
                                if (t1 === t2) teammateCollisions.push({ r: round.number, m: i+1, t: t1, p1: id, p2: id2 });
                                else { const tKey = [t1, t2].sort((a,b)=>a-b).join('-'); teamStats[tKey] = (teamStats[tKey] || 0) + 1; }
                            }
                        }});
                    });
                    tableCard.innerHTML = `<div class="table-title">Mesa ${i+1}</div><div class="player-list">${playersHtml}</div>`;
                    tableGrid.appendChild(tableCard);
                });
                roundSection.appendChild(tableGrid); container.appendChild(roundSection);
            });
            const statsCard = document.createElement('div'); statsCard.className = 'stats-card';
            let playerRepeatsHtml = Object.entries(playerStats).filter(([_, c]) => c > 1).map(([k, c]) => `<div class="stat-item">${k.replace('-',' & ')} <span class="stat-val">${c} veces</span></div>`).join('') || '<p>✅ Sin repeticiones.</p>';
            let statsHtml = `<h2>📊 Calidad</h2><h3 style="font-size:0.8rem; color:var(--text-dim);">REPETICIONES</h3><div class="stats-grid">${playerRepeatsHtml}</div>`;
            if (useTeams) {
                let collisionsHtml = teammateCollisions.map(c => `<div class="stat-item">R${c.r} M${c.m}: #${c.p1} & #${c.p2} <span class="stat-val">Eq ${c.t}</span></div>`).join('') || '<p>✅ Limpieza total.</p>';
                let teamStatsHtml = Object.entries(teamStats).sort((a,b) => b[1]-a[1]).map(([k, c]) => `<div class="stat-item">${k.replace('-',' vs ')} <span class="stat-val">${c} cruces</span></div>`).join('');
                statsHtml += `<h3 style="font-size:0.8rem; color:var(--text-dim); margin-top:20px;">COMPAÑEROS</h3><div class="stats-grid">${collisionsHtml}</div><h3 style="font-size:0.8rem; color:var(--text-dim); margin-top:20px;">EQUIPOS</h3><div class="stats-grid">${teamStatsHtml}</div>`;
            }
            statsCard.innerHTML = statsHtml; container.appendChild(statsCard);
        }
    </script>
</body>
</html>
