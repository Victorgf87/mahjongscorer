<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mahjong Scorer v4.13.5 PRO</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3406/3406059.png">
    <meta name="theme-color" content="#121212">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1338580016730480" crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-1338580016730480">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="google-site-verification" content="rmyy-xRKhjbY5KowBBn7yI97rKPM1aJo7T83bvsS4iU" />
    <style>
        :root {
            --bg: #121212; --surface: #1e1e1e; --primary: #00c853;
            --text: #e0e0e0; --text-dim: #9e9e9e; --border: rgba(255,255,255,0.1);
            --danger: #ff5252;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; min-height: calc(100vh - 40px); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; width: 100%; }
        .header h1 { margin: 0; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; color: var(--primary); font-weight: 800; }
        .header h1 span { font-size: 1.8rem; }
        
        .main-nav { display: flex; gap: 15px; }
        .main-nav a { color: var(--text-dim); text-decoration: none; font-weight: 700; font-size: 0.85rem; transition: color 0.2s; }
        .main-nav a:hover { color: var(--primary); }
        
        .card { background: var(--surface); border-radius: 32px; padding: 40px; text-align: center; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.4); width: 100%; }
        
        .mode-selector { display: flex; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 16px; margin-bottom: 35px; border: 1px solid var(--border); }
        .mode-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 0.85rem; transition: all 0.2s; color: var(--text-dim); background: transparent; }
        .mode-btn.active { background: var(--primary); color: var(--bg); }

        .record-btn {
            width: 105px; height: 105px; border-radius: 50%; background: var(--primary);
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 20px rgba(0, 200, 83, 0.2);
        }
        .record-btn:active { transform: scale(0.9); }
        .record-btn.recording { animation: pulse 1.5s infinite; background: var(--danger); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(255, 82, 82, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); } }
        
        .status { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 25px; font-weight: 600; min-height: 1.2rem; }

        .manual-input-container { margin-top: 30px; border-top: 1px solid var(--border); padding-top: 30px; }
        .manual-input-group { display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 18px; border: 1px solid var(--border); }
        .manual-input { flex: 1; background: transparent; border: none; color: var(--text); padding: 5px 12px; font-size: 1rem; outline: none; }
        .send-btn { background: var(--primary); color: var(--bg); border: none; width: 46px; height: 44px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; }

        .result-container { margin-top: 35px; text-align: left; background: rgba(0,0,0,0.4); padding: 30px; border-radius: 28px; border: 1px solid rgba(0, 200, 83, 0.3); display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #input-echo { font-size: 0.85rem; color: var(--text-dim); font-style: italic; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .result-label { font-size: 0.75rem; color: var(--primary); text-transform: uppercase; font-weight: 800; margin-bottom: 12px; letter-spacing: 1px; }
        #result { font-size: 1.1rem; line-height: 1.6; font-weight: 600; color: white; white-space: pre-line; }

        .footer { margin-top: auto; padding: 40px 0 20px; text-align: center; }
        .donate-btn { background: #292929; color: #ff5e5b; text-decoration: none; padding: 14px 24px; border-radius: 16px; font-size: 0.85rem; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(255,94,91,0.2); }
        
        .version-tag { position: fixed; bottom: 10px; right: 15px; font-size: 0.65rem; color: var(--primary); opacity: 0.4; font-weight: bold; }

        @media (max-width: 600px) {
            .container { padding: 0 10px; }
            .card { padding: 30px 20px; }
            .header h1 { font-size: 1.3rem; }
            .version-tag { position: relative; bottom: 0; right: 0; margin-top: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><span>🀄</span> Mahjong Scorer</h1>
            <nav class="main-nav">
                <a href="reglas.html">Reglas</a>
                <a href="jugadas.html">Jugadas</a>
                <a href="pairings.html">Torneo</a>
            </nav>
        </header>

        <div class="card">
            <div class="mode-selector">
                <button id="modeMCR" class="mode-btn active" onclick="setMode('MCR')">MCR</button>
                <button id="modeRiichi" class="mode-btn" onclick="setMode('Riichi')">Riichi</button>
            </div>

            <button id="recordBtn" class="record-btn">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:white;"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
            </button>
            <div id="status" class="status">Pulsa para arbitrar por voz</div>
            
            <div class="manual-input-container">
                <div class="manual-input-group">
                    <input type="text" id="manualPlay" class="manual-input" placeholder="O escribe la jugada aquí..." onkeypress="handleEnter(event)">
                    <button class="send-btn" onclick="submitManualPlay()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--bg);"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            </div>

            <div id="result-container" class="result-container">
                <div id="input-echo"></div>
                <div class="result-label">Cálculo de Puntuación</div>
                <div id="result"></div>
            </div>
        </div>

        <footer class="footer">
            <a href="https://ko-fi.com/victorgf87" target="_blank" class="donate-btn"><span>☕</span> Invitar a un café</a>
        </footer>
    </div>

    <div class="version-tag">v4.14.7-stable</div>

    <script>
        const recordBtn = document.getElementById('recordBtn'), status = document.getElementById('status'), resultContainer = document.getElementById('result-container'), resultDiv = document.getElementById('result'), modeMCR = document.getElementById('modeMCR'), modeRiichi = document.getElementById('modeRiichi'), manualInput = document.getElementById('manualPlay'), inputEcho = document.getElementById('input-echo');
        let currentMode = 'MCR', mediaRecorder, audioChunks = [];
        let lastInput = "";

        function setMode(m) {
            currentMode = m;
            modeMCR.classList.toggle('active', m === 'MCR');
            modeRiichi.classList.toggle('active', m === 'Riichi');
        }

        function handleEnter(e) { if(e.key === 'Enter') submitManualPlay(); }

        async function submitManualPlay() {
            const playText = manualInput.value.trim();
            if (!playText) return;
            lastInput = playText;
            status.innerText = "Analizando texto...";
            resultContainer.style.display = 'none';
            try {
                const res = await fetch('/api/score', {
                    method: 'POST',
                    body: JSON.stringify({ text: playText, mode: currentMode }),
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await res.json();
                showResult(data.score);
            } catch(e) { status.innerText = "Error de conexión"; }
        }

        function showResult(score) {
            resultContainer.style.display = 'block';
            let detected = lastInput;
            let analysis = score;

            if (score && score.includes('ENTRADA:')) {
                const parts = score.split('---');
                detected = parts[0].replace('ENTRADA:', '').trim();
                analysis = parts.length > 1 ? parts.slice(1).join('---').trim() : parts[0].trim();
            }

            inputEcho.innerText = `Has dicho: "${detected}"`;
            inputEcho.style.display = 'block';
            resultDiv.innerText = analysis || "No se pudo interpretar la jugada.";
            status.innerText = "¡Listo!";
            manualInput.value = "";
        }

        recordBtn.onclick = async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop(); recordBtn.classList.remove('recording'); status.innerText = "Analizando jugada..."; return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' }), reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = async () => {
                        try {
                            const res = await fetch('/api/score', {
                                method: 'POST', body: JSON.stringify({ audio: reader.result.split(',')[1], mode: currentMode }), headers: { 'Content-Type': 'application/json' }
                            });
                            const data = await res.json();
                            showResult(data.score);
                        } catch(e) { status.innerText = "Error de audio"; }
                    };
                };
                mediaRecorder.start(); recordBtn.classList.add('recording'); status.innerText = "Escuchando...";
            } catch(e) { status.innerText = "Error micro"; }
        };
    </script>
</body>
</html>
