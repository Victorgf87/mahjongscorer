<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8-Point Optimizer | Mahjong Scorer</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3406/3406059.png">
    <style>
        :root {
            --bg: #121212; --surface: #1e1e1e; --primary: #00c853;
            --text: #e0e0e0; --text-dim: #9e9e9e; --border: rgba(255,255,255,0.1);
            --tile-bg: #f5f5f5; --tile-text: #222;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; width: 100%; }
        .header h1 { margin: 0; font-size: 1.2rem; color: var(--primary); font-weight: 800; cursor: pointer; }
        .main-nav { display: flex; gap: 15px; }
        .main-nav a { color: var(--text-dim); text-decoration: none; font-weight: 700; font-size: 0.85rem; }
        .main-nav a.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .card { background: var(--surface); border-radius: 24px; padding: 20px; border: 1px solid var(--border); width: 100%; margin-bottom: 20px; }
        
        .hand-area { min-height: 80px; background: rgba(0,0,0,0.2); border-radius: 16px; padding: 10px; display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; border: 1px dashed var(--border); justify-content: center; align-items: center; }
        .hand-area:empty::after { content: "Toca las fichas de abajo para armar tu mano (máx 14)"; color: var(--text-dim); font-size: 0.8rem; }

        .tile {
            width: 40px; height: 55px; background: var(--tile-bg); border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; color: var(--tile-text); cursor: pointer;
            user-select: none; transition: transform 0.1s, box-shadow 0.1s;
            border-bottom: 4px solid #ccc;
        }
        .tile:active { transform: scale(0.95); }
        .tile.in-hand { width: 35px; height: 48px; font-size: 1.8rem; }

        .selector-group { margin-bottom: 15px; }
        .group-title { font-size: 0.75rem; color: var(--text-dim); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .tiles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; }

        .btn-analyze {
            width: 100%; padding: 15px; border-radius: 14px; background: var(--primary); color: var(--bg);
            border: none; font-weight: 800; font-size: 1rem; cursor: pointer; margin-top: 10px;
            transition: opacity 0.2s;
        }
        .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

        .results { margin-top: 20px; display: none; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px; border: 1px solid rgba(0, 200, 83, 0.2); }
        .route-card { margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .route-card:last-child { border-bottom: none; }
        .route-title { color: var(--primary); font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .route-content { font-size: 0.95rem; line-height: 1.5; color: var(--text); }
        
        .loading { display: none; text-align: center; padding: 20px; color: var(--primary); font-weight: 800; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 onclick="location.href='index.html'"><span>🀄</span> Optimizer</h1>
            <nav class="main-nav">
                <a href="index.html">Árbitro</a>
                <a href="optimizer.html" class="active">Optimizador</a>
            </nav>
        </header>

        <div class="card">
            <div id="hand" class="hand-area"></div>
            
            <div class="selector-group">
                <div class="group-title">Caracteres (Wan)</div>
                <div class="tiles-grid" id="group-characters"></div>
            </div>
            <div class="selector-group">
                <div class="group-title">Bambúes (Suo)</div>
                <div class="tiles-grid" id="group-bamboos"></div>
            </div>
            <div class="selector-group">
                <div class="group-title">Círculos (Tong)</div>
                <div class="tiles-grid" id="group-circles"></div>
            </div>
            <div class="selector-group">
                <div class="group-title">Honores (Vientos y Dragones)</div>
                <div class="tiles-grid" id="group-honors"></div>
            </div>

            <button id="analyzeBtn" class="btn-analyze" disabled>Analizar Rutas</button>
        </div>

        <div id="loading" class="loading">Buscando rutas óptimas...</div>
        <div id="results" class="results"></div>
    </div>

    <script>
        const hand = [];
        const tilesData = {
            characters: ['🀇', '🀈', '🀉', '🀊', '🀋', '🀌', '🀍', '🀎', '🀏'],
            bamboos: ['🀐', '🀑', '🀒', '🀓', '🀔', '🀕', '🀖', '🀗', '🀘'],
            circles: ['🀙', '🀚', '🀛', '🀜', '🀝', '🀞', '🀟', '🀠', '🀡'],
            honors: ['🀀', '🀁', '🀂', '🀃', '🀄', '🀅', '🀆']
        };

        const handEl = document.getElementById('hand');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resultsEl = document.getElementById('results');
        const loadingEl = document.getElementById('loading');

        function init() {
            for (const [group, tiles] of Object.entries(tilesData)) {
                const grid = document.getElementById(`group-${group}`);
                tiles.forEach(t => {
                    const btn = document.createElement('div');
                    btn.className = 'tile';
                    btn.innerText = t;
                    btn.onclick = () => addToHand(t);
                    grid.appendChild(btn);
                });
            }
        }

        function addToHand(tile) {
            if (hand.length >= 14) return;
            hand.push(tile);
            renderHand();
        }

        function removeFromHand(index) {
            hand.splice(index, 1);
            renderHand();
        }

        function renderHand() {
            handEl.innerHTML = '';
            hand.forEach((t, i) => {
                const btn = document.createElement('div');
                btn.className = 'tile in-hand';
                btn.innerText = t;
                btn.onclick = () => removeFromHand(i);
                handEl.appendChild(btn);
            });
            analyzeBtn.disabled = hand.length < 5; // Mínimo 5 fichas para una sugerencia básica
        }

        analyzeBtn.onclick = async () => {
            loadingEl.style.display = 'block';
            resultsEl.style.display = 'none';
            analyzeBtn.disabled = true;

            try {
                const res = await fetch('/api/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hand: hand.join('') })
                });
                const data = await res.json();
                showResults(data.analysis);
            } catch (e) {
                alert("Error al conectar con la IA");
            } finally {
                loadingEl.style.display = 'none';
                analyzeBtn.disabled = false;
            }
        };

        function showResults(analysis) {
            resultsEl.style.display = 'block';
            resultsEl.innerHTML = '';
            
            // Suponemos que la IA devuelve un texto con secciones separadas por "Ruta"
            const routes = analysis.split(/Ruta \d+:/i).filter(r => r.trim());
            
            routes.forEach((route, i) => {
                const card = document.createElement('div');
                card.className = 'route-card';
                card.innerHTML = `
                    <div class="route-title">📍 Sugerencia ${i+1}</div>
                    <div class="route-content">${route.trim().replace(/\n/g, '<br>')}</div>
                `;
                resultsEl.appendChild(card);
            });
            
            if (routes.length === 0) {
                resultsEl.innerHTML = `<div class="route-content">${analysis}</div>`;
            }
        }

        init();
    </script>
</body>
</html>
