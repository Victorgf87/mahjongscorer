<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Historial | Mahjong Scorer v2.0</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3406/3406059.png">
    <style>
        :root {
            --bg: #121212; --surface: #1e1e1e; --primary: #00c853;
            --text: #e0e0e0; --text-dim: #9e9e9e; --border: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; width: 100%; }
        .header h1 { margin: 0; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; color: var(--primary); font-weight: 800; cursor: pointer; }
        
        .main-nav { display: flex; gap: 15px; }
        .main-nav a { color: var(--text-dim); text-decoration: none; font-weight: 700; font-size: 0.85rem; transition: color 0.2s; }
        .main-nav a.active { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 2px; }
        
        .card { background: var(--surface); border-radius: 28px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.4); width: 100%; margin-bottom: 15px; text-align: left; }
        
        .history-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.75rem; color: var(--text-dim); font-weight: bold; }
        .history-mode { background: rgba(0, 200, 83, 0.1); color: var(--primary); padding: 2px 8px; border-radius: 6px; }
        .history-input { font-style: italic; color: var(--text); margin-bottom: 10px; }
        .history-result { font-size: 0.95rem; line-height: 1.4; border-top: 1px solid var(--border); padding-top: 10px; white-space: pre-line; }

        .premium-badge { background: linear-gradient(45deg, #ffd700, #ff8c00); color: #000; padding: 2px 8px; border-radius: 6px; font-size: 0.6rem; font-weight: 900; text-transform: uppercase; margin-left: 5px; }

        .empty-state { text-align: center; color: var(--text-dim); margin-top: 50px; }
        .version-tag { position: fixed; bottom: 10px; right: 15px; font-size: 0.65rem; color: var(--primary); opacity: 0.4; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 onclick="location.href='index.html'"><span>🀄</span> Scorer</h1>
            <nav class="main-nav">
                <a href="pairings.html">Torneo</a>
                <a href="history.html" class="active">Historial</a>
            </nav>
        </header>

        <div id="history-container">
            <div class="empty-state">Cargando tu historial...</div>
        </div>
    </div>

    <div class="version-tag">v2.0.0-premium-alpha</div>

    <script>
        async function loadHistory() {
            let userId = localStorage.getItem('mahjong_user_id');
            if (!userId) {
                document.getElementById('history-container').innerHTML = '<div class="empty-state">Aún no has realizado ninguna jugada.</div>';
                return;
            }

            try {
                const res = await fetch(`/api/history?userId=${userId}`);
                const data = await res.json();
                
                if (data.history && data.history.length > 0) {
                    renderHistory(data.history);
                } else {
                    document.getElementById('history-container').innerHTML = '<div class="empty-state">Tu historial está vacío. ¡Empieza a arbitrar!</div>';
                }
            } catch (e) {
                document.getElementById('history-container').innerHTML = '<div class="empty-state">Error al cargar historial.</div>';
            }
        }

        function renderHistory(items) {
            const container = document.getElementById('history-container');
            container.innerHTML = '';
            
            items.forEach(item => {
                const date = new Date(item.timestamp).toLocaleString();
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="history-item-header">
                        <span>${date}</span>
                        <span class="history-mode">${item.mode} <span class="premium-badge">PRO</span></span>
                    </div>
                    <div class="history-input">"${item.input_text}"</div>
                    <div class="history-result">${item.ai_raw_response}</div>
                `;
                container.appendChild(card);
            });
        }

        loadHistory();
    </script>
</body>
</html>
